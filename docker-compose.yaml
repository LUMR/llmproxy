services:
  langfuse-server:
    image: langfuse/langfuse:2
    ports:
      - "3100:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - SALT=${SALT}
      - NEXTAUTH_URL=http://localhost:3100
      - TELEMETRY_ENABLED=false
    networks:
      - apps
    restart: unless-stopped

networks:
  apps:
    external: true